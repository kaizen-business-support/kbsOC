version: '3.8'

# ─── OptimusCredit — Production (réseau local) ───────────────────────────────
#
# Architecture :
#   [Clients LAN] → port 80 → [frontend/nginx]
#                                    │
#                              /api/* ↓
#                            [backend:5007]
#                               │        │
#                           [postgres] [redis]
#                           (internes, non exposés)

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: optimus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - optimus-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 20s
      timeout: 10s
      retries: 5
    # Aucun port exposé — accessible uniquement en interne

  # ── Cache Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: optimus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - optimus-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
    # Aucun port exposé — accessible uniquement en interne

  # ── Backend Node.js ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: optimus-backend
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/var/backups/credit_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - optimus-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    # Aucun port exposé — accessible via le frontend/nginx

  # ── Frontend Nginx (React + reverse proxy API) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_PORT: "80"
    container_name: optimus-frontend
    restart: unless-stopped
    ports:
      - "80:80"    # Seul port exposé sur le réseau local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - optimus-internal

# ── Volumes persistants ───────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  backups_data:
    driver: local

# ── Réseau interne (isolé) ────────────────────────────────────────────────────
networks:
  optimus-internal:
    driver: bridge
