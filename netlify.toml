[build]
  # Directory with the build output
  publish = "build"

  # Build command
  command = "npm run build"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (you can also set these in Netlify UI)
[build.environment]
  NODE_VERSION = "18"
  REACT_APP_API_PORT = "5006"
